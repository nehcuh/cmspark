# Instincts — auto-extracted reusable patterns
# Confidence: 0-1 (higher = more validated)

instincts:
  - id: broadcast-delegation
    pattern: "When server needs to trigger action in a different client, broadcast a start message to all clients and let the target client initiate its own request. This avoids modifying shared pipelines for cross-client routing."
    confidence: 0.7
    source_session: "2026-06-09 quick actions simplification"
    tags: [architecture, websocket, cross-client]
    applications: 1

  - id: ws-response-id-pairing
    pattern: "WebSocket 请求/响应必须用唯一 id 配对;响应的 type 字段不能复用为 push 订阅条件,否则响应会触发同名请求形成死循环。daemon 端响应应回显请求 id,客户端优先按 id 匹配 pending 再分发剩余消息。"
    confidence: 0.8
    source_session: "2026-06-28 tray↔daemon skill.list 死循环修复"
    tags: [websocket, bug, request-response, loop]
    applications: 1

  - id: parallel-audit-fanout-then-verify
    pattern: "对大规模代码审计/审查:按维度簇(安全/前端/后端/发布等)fan-out 并行 general-purpose 子代理,每个深读相关文件返回 file:line 级结构化 findings(issue-card 格式);主会话对 Critical/High 论断做对抗性复核——直接 Read 源码确认,避免子代理误报导致虚高评分;再综合打分(判断非扣分,按系统性 vs 孤立)。子代理做广度,主会话保准确度。"
    confidence: 0.6
    source_session: "2026-07-09 Fuck My Shit Mountain 全量审计"
    tags: [audit, review, parallel-agents, adversarial-verify, evidence]
    applications: 1

  - id: verify-race-before-locking
    pattern: "审计/评审提'竞态/需加锁'时,先确认是否存在 await 间隙。JS 单线程下,全同步的 read-modify-write(如 getConfig→deepMerge→writeFileSync 无 await)天然原子,不存在交错竞态;只有 caller'读→await→用陈旧快照写'才有竞态。别为不存在的竞态加 mutex(cargo-cult)。cmspark saveConfig 审计标 High 竞态,查证为非 bug。"
    confidence: 0.8
    source_session: "2026-07-10 P1-3 saveConfig H5 查证"
    tags: [concurrency, race-condition, javascript, single-thread, mutex, verify]
    applications: 1

  - id: kimi-gate-catches-real-issues
    pattern: "对每处改动跑 kimi 独立终审($KIMI -p \"$(<difffile)\")常拦下真问题:kimi 实测/独立验证比纯推理准。本轮拦下:zip-slip 预检用 adm-zip(读写都规范化..→失效)、{...defaultConfig} 浅拷贝污染默认、build 脚本未关门。同时要敢于反驳 kimi 的过度建议(如对全同步函数要求加锁/await)。采纳前验证,错的反驳。"
    confidence: 0.75
    source_session: "2026-07-10 4 PR 的 kimi 终审"
    tags: [kimi, code-review, verification, methodology, pushback]
    applications: 4
