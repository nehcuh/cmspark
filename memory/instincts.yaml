instincts:
  - id: broadcast-delegation
    pattern: "When server needs to trigger action in a different client, broadcast a start message to all clients and let the target client initiate its own request. This avoids modifying shared pipelines for cross-client routing."
    confidence: 0.7
    source_session: "2026-06-09 quick actions simplification"
    tags: [architecture, websocket, cross-client]
    applications: 1

  - id: ws-response-id-pairing
    pattern: "WebSocket 请求/响应必须用唯一 id 配对;响应的 type 字段不能复用为 push 订阅条件,否则响应会触发同名请求形成死循环。daemon 端响应应回显请求 id,客户端优先按 id 匹配 pending 再分发剩余消息。"
    confidence: 0.8
    source_session: "2026-06-28 tray↔daemon skill.list 死循环修复"
    tags: [websocket, bug, request-response, loop]
    applications: 1

  - id: parallel-audit-fanout-then-verify
    pattern: "对大规模代码审计/审查:按维度簇(安全/前端/后端/发布等)fan-out 并行 general-purpose 子代理,每个深读相关文件返回 file:line 级结构化 findings(issue-card 格式);主会话对 Critical/High 论断做对抗性复核——直接 Read 源码确认,避免子代理误报导致虚高评分;再综合打分(判断非扣分,按系统性 vs 孤立)。子代理做广度,主会话保准确度。"
    confidence: 0.6
