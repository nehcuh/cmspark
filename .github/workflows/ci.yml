name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: companion/package-lock.json

      - name: Install dependencies
        run: |
          cd companion && npm ci

      - name: Verify systray2 binary integrity
        run: |
          cd companion && node ../scripts/verify-systray2.js --strict

      - name: Verify Node archive checksum helper (audit H8)
        # package.sh now sha256-verifies the downloaded Node binary against
        # nodejs.org SHASUMS256.txt before extracting. This runs that helper's
        # self-test + a syntax check on the packager so a regression can't ship
        # an unverified (supply-chain-tamperable) node binary.
        run: |
          bash -n scripts/package.sh
          bash -n scripts/verify-node.sh
          bash scripts/tests/test-verify-node.sh

      - name: Build companion
        run: |
          cd companion && npm run build

      - name: Run companion tests
        run: |
          cd companion && npm test

      - name: Setup chrome-extension Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: chrome-extension/package-lock.json

      - name: Build + typecheck chrome-extension (audit H7)
        run: |
          cd chrome-extension && npm ci && npm run build

      - name: Run chrome-extension tests
        # Runs the full extension test suite in CI so drift between production
        # initial-sync messages and the sidepanel-state test (and any other
        # extension test) is caught here, not silently. The test script's glob
        # is POSIX-portable (*.test.js) so it matches under dash/sh without
        # globstar.
        run: |
          cd chrome-extension && npm test

      - name: Supply-chain audit — chrome-extension PRODUCTION deps (gating)
        # Shipped (non-dev) deps must be advisory-free. Currently 0 after the
        # dompurify@3.4.11 floor bump (audit P1-2). These deps ship inside the
        # MV3 bundle to end users, so a NEW advisory here MUST block CI until
        # patched or explicitly overridden in package.json. Escape hatch: add a
        # targeted `overrides` entry + document the accepted risk in
        # docs/supply-chain.md, then re-pin.
        run: |
          cd chrome-extension && npm audit --omit=dev

      - name: Supply-chain audit — chrome-extension full tree (informational)
        # Dev-toolchain advisories (plasmo, the @parcel/* + @plasmohq/parcel-*
        # family, svelte, esbuild, lmdb, msgpackr, tsup, @babel/core,
        # content-security-policy-parser) are BUILD-TIME ONLY — they are the
        # bundler and its plugins and are NOT shipped in the extension artifact.
        # They are blocked on plasmo upgrading its Parcel pin upstream (see
        # docs/supply-chain.md). continue-on-error so the known-unfixable set
        # does not gate; the step still surfaces NEW advisories for triage.
        continue-on-error: true
        run: |
          cd chrome-extension && npm audit
