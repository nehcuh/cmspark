name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: companion/package-lock.json

      - name: Install dependencies
        run: |
          cd companion && npm ci

      - name: Verify systray2 binary integrity
        run: |
          cd companion && node ../scripts/verify-systray2.js --strict

      - name: Verify Node archive checksum helper (audit H8)
        # package.sh now sha256-verifies the downloaded Node binary against
        # nodejs.org SHASUMS256.txt before extracting. This runs that helper's
        # self-test + a syntax check on the packager so a regression can't ship
        # an unverified (supply-chain-tamperable) node binary.
        run: |
          bash -n scripts/package.sh
          bash -n scripts/verify-node.sh
          bash scripts/tests/test-verify-node.sh

      - name: Build companion
        run: |
          cd companion && npm run build

      - name: Run companion tests
        run: |
          cd companion && npm test

      - name: Setup chrome-extension Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: chrome-extension/package-lock.json

      - name: Build + typecheck chrome-extension (audit H7)
        run: |
          cd chrome-extension && npm ci && npm run build
